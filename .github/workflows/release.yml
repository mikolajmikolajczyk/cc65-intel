name: release

# Publish to npm when a version tag is pushed (`just release X.Y.Z` creates +
# pushes the tag). Runs the full gate first; publishes only if it passes.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) — no token, provenance is automatic

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # --- gate (same as CI) ---
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm madge:circular
      - run: pnpm build
      - run: pnpm test

      # --- publish via OIDC trusted publishing (no token; provenance automatic) ---
      # Requires a Trusted Publisher configured on npm for each package
      # (GitHub Actions → mikolajmikolajczyk/cc65-intel, workflow release.yml).
      # The first publish must be a manual/local one — trusted publishing can
      # only be configured after the package exists. See CONTRIBUTING.md.
      - run: pnpm -r publish --access public --no-git-checks
